name: EXAMPLE
on:
  pull_request:
    branches:
      - stable
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  run_job_with_aws:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4 # Or a specific version
        with:
          role-to-assume: ${{vars.AWS_SECURITY_PROD_ROLE_ARN}}
          aws-region: eu-west-2 #${{vars.AWS_REGION}}
      - name: Additional steps
        run: |
          # Your commands that require AWS credentials
          aws sts get-caller-identity 
