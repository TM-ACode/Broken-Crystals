name: EXAMPLE

on:
  pull_request:
    branches:
      - stable
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  run_job_with_aws:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_SECURITY_PROD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get secrets by name and by ARN
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            AppCheck_CICDToken

      - name: Verify AWS Identity (Secure Output)
        run: |
          echo "Verifying AWS identity..."
          aws sts get-caller-identity --output json > identity.json

          ACCOUNT_ID=$(jq -r .Account identity.json)
          USER_ARN=$(jq -r .Arn identity.json)
          USER_ID=$(jq -r .UserId identity.json)

          echo "AWS Identity Verified."
          echo "Account ID and User details retrieved securely."

        # Optional: if you want to use these values in later steps
        env:
          AWS_ACCOUNT_ID: ${{ steps.verify_identity.outputs.ACCOUNT_ID }}
          AWS_USER_ARN: ${{ steps.verify_identity.outputs.USER_ARN }}
          AWS_USER_ID: ${{ steps.verify_identity.outputs.USER_ID }}
          AppCheck_CICDToken: ${{ env.AppCheck_CICDToken }}
