name: EXAMPLE - secure no-persist secrets

on:
  pull_request:
    branches:
      - stable
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  run_job_with_aws:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, short-lived)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_SECURITY_PROD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Use secret in-memory only and immediately consume it
        id: consume_secret
        shell: bash
        run: |
          set -euo pipefail

          # On any exit, ensure secret variable is cleared from memory
          cleanup() {
            # Overwrite variable contents then unset
            SECRET=""
            unset SECRET || true
          }
          trap cleanup EXIT

          # Retrieve secret into a shell variable (in-memory only). This uses AWS CLI over TLS.
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id AppCheck_CICDToken \
            --region "${{ vars.AWS_REGION }}" \
            --query SecretString --output text)

          # Immediately consume the secret by passing it to the process that needs it.
          # Example: a CLI that accepts the token on stdin or as an argument for a single invocation.
          # Replace `my_secure_command --token-stdin` with the real consumer command.
          #
          # Important: do NOT echo the secret or write it to a file.
          #
          # Example using stdin to avoid environment export:
          printf '%s' "$SECRET" | my_secure_command --token-stdin

          # Example using argument (if the consumer requires an argument); avoid long-lived export:
          # my_secure_command --token "$SECRET"

          # Overwrite and unset immediately (cleanup trap will also run on exit)
          SECRET=""
          unset SECRET
