name: oidc_test

on:
  pull_request:
    branches:
      - '**'

permissions:
  id-token: write
  contents: read

jobs:
  echo-oidc-token:
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve and echo OIDC token
        shell: bash
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.value')

          BASE64_TOKEN=$(echo -n "$OIDC_TOKEN" | base64)

          echo "BASE64_OIDC_TOKEN=$BASE64_TOKEN"
