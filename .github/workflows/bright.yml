name: "Security Tests"

on:
  pull_request:
    branches:
      - '**'

permissions:
  checks: write
  contents: read

env:
  BRIGHT_TARGET_URL: http://127.0.0.1:3000
  BRIGHT_HOSTNAME: ${{ vars.BRIGHT_HOSTNAME }}
  BRIGHT_PROJECT_ID: ${{ vars.BRIGHT_PROJECT_ID }}
  BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  security-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install application dependencies
        run: npm ci --no-audit

      - name: Start application
        run: docker compose --file=compose.local.yml up -d --wait

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            nc -zv 127.0.0.1 3000 && echo "Application is ready" && exit 0
            echo "Waiting for application to be ready..."
            sleep 5
          done
          echo "Application did not become ready in time" && exit 1

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install SecTesterJS dependencies
        run: npm i --prefix=.brightsec --save=false @sectester/core @sectester/repeater @sectester/scan @sectester/runner

      - name: Run security tests
        run: |
          node --experimental-transform-types \
               --experimental-strip-types \
               --experimental-detect-module \
               --disable-warning=MODULE_TYPELESS_PACKAGE_JSON \
               --disable-warning=ExperimentalWarning \
               --test-force-exit \
               --test .brightsec/tests/*.test.ts \
               --test-concurrency=4
        env:
          BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIGHT_TARGET_URL: ${{ env.BRIGHT_TARGET_URL }}
          BRIGHT_HOSTNAME: ${{ env.BRIGHT_HOSTNAME }}
          BRIGHT_PROJECT_ID: ${{ env.BRIGHT_PROJECT_ID }}