name: "Security Tests"

on:
  pull_request:
    branches:
      - '**'

permissions:
  checks: write
  contents: read

env:
  HUSKY: 0

jobs:
  security-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Disable prepare script (husky)
        run: npm pkg delete scripts.prepare

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Install SecTester dependencies
        run: npm i --save-dev @sectester/core @sectester/repeater @sectester/scan @sectester/runner

      - name: Start application
        run: docker compose --file=docker-compose.local.yml up -d --build

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if nc -zv 127.0.0.1 3000; then
              echo "Application is ready!"
              break
            fi
            echo "Waiting for application to be ready..."
            sleep 5
          done

      - name: Run security tests
        env:
          BRIGHT_HOSTNAME: ${{ vars.BRIGHT_HOSTNAME }}
          BRIGHT_PROJECT_ID: ${{ vars.BRIGHT_PROJECT_ID }}
          BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIGHT_TARGET_URL: "http://127.0.0.1:3000"
        run: |
          node --experimental-transform-types \
               --experimental-strip-types \
               --experimental-detect-module \
               --disable-warning=MODULE_TYPELESS_PACKAGE_JSON \
               --disable-warning=ExperimentalWarning \
               --test-force-exit \
               --test .brightsec/tests/*.test.ts \
               --test-concurrency=4

      - name: Shutdown application
        if: always()
        run: docker compose --file=docker-compose.local.yml down
