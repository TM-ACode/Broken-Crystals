name: "Security Tests"

on:
  pull_request:
    branches:
      - '**'

permissions:
  checks: write
  contents: read

env:
  POSTGRES_DB: bc
  POSTGRES_PASSWORD: bc
  POSTGRES_USER: bc
  URL: http://localhost:3000

jobs:
  security-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm ci

      - name: Install SecTester
        run: npm i --save-dev @sectester/core @sectester/repeater @sectester/scan @sectester/runner

      - name: Start services
        run: docker compose --file=docker-compose.local.yml up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to be ready..."
          while ! curl -sSf http://localhost:3000 > /dev/null; do
            echo "Waiting for application to be ready..."
            sleep 5
          done
          echo "Application is ready!"

      - name: Run security tests
        run: npx jest --config ./test/jest-e2e.config.mjs test/security/*.e2e-spec.ts
        env:
          BRIGHT_HOSTNAME: ${{ vars.BRIGHT_HOSTNAME }}
          BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIGHT_TARGET_URL: http://localhost:3000
