name: Security Tests

on:
  pull_request:
    branches: [ '**' ]

permissions:
  checks: write
  contents: read

jobs:
  security-tests:
    runs-on: ubuntu-latest

    env:
      KEYCLOAK_PASSWORD: Pa55w0rd
      KEYCLOAK_USER: admin
      POSTGRES_DB: bc
      POSTGRES_PASSWORD: bc
      POSTGRES_USER: bc

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm ci

    - name: Install SecTester
      run: npm i --save-dev @sectester/core @sectester/repeater @sectester/scan @sectester/runner

    - name: Start services
      run: docker compose -f docker-compose.local.yml up -d

    - name: Wait for DB to be ready
      run: |
        until docker exec nodejs pg_isready -U bc -d bc; do
          echo 'Waiting for database...'
          sleep 5
        done

    - name: Run security tests
      env:
        BRIGHT_HOSTNAME: ${{ vars.BRIGHT_HOSTNAME }}
        BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRIGHT_TARGET_URL: http://localhost:3000
      run: npx jest --config ./test/jest-e2e.config.mjs test/security/*.spec.ts
