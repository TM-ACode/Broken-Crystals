name: "Security Tests"

on:
  pull_request:
    branches:
      - '**'

permissions:
  checks: write
  contents: read

env:
  HUSKY: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Disable prepare script (husky)
        run: npm pkg delete scripts.prepare

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Install SecTester
        run: npm i --save-dev @sectester/core @sectester/repeater @sectester/scan @sectester/runner

      - name: Build server
        run: npm ci && npm run build

      - name: Build client
        run: npm ci --prefix client && npm run build --prefix client

      - name: Start services
        run: docker compose --file=docker-compose.local.yml up -d

      - name: Wait for services to be ready
        run: |
          while ! nc -z localhost 3000; do
            sleep 1
          done

      - name: Run security tests
        env:
          BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEC_TESTER_TARGET: http://localhost:3000
        run: npx jest --config ./test/jest-e2e.config.mjs test/security/get-search-partners.e2e-spec.ts
