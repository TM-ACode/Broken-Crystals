name: "Security Tests"

on:
  pull_request:
    branches:
      - '**'

permissions:
  checks: write
  contents: read

env:
  HUSKY: 0

jobs:
  security-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Disable prepare script (husky)
        run: npm pkg delete scripts.prepare

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Install SecTester
        run: npm i --save-dev @sectester/core @sectester/repeater @sectester/scan @sectester/runner

      - name: Start application
        run: docker compose --file=docker-compose.local.yml up -d
        env:
          KEYCLOAK_PASSWORD: Pa55w0rd
          KEYCLOAK_USER: admin
          POSTGRES_DB: bc
          POSTGRES_PASSWORD: bc
          POSTGRES_USER: bc

      - name: Wait for application to be ready
        run: |
          until curl --output /dev/null --silent --head --fail http://localhost:3000; do
            echo 'Waiting for application...'
            sleep 5
          done

      - name: Run security tests
        run: npx jest --config ./test/jest-e2e.config.mjs test/security/*.e2e-spec.ts
        env:
          BRIGHT_HOSTNAME: ${{ vars.BRIGHT_HOSTNAME }}
          BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIGHT_TARGET_URL: http://localhost:3000
