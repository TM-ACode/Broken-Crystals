name: Security Tests

on:
  pull_request:
    branches: [ '**' ]

permissions:
  checks: write
  contents: read

jobs:
  security-tests:
    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: bc
      POSTGRES_PASSWORD: bc
      POSTGRES_USER: bc

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm ci

    - name: Install client dependencies
      run: npm ci --prefix client

    - name: Build server
      run: npm run build

    - name: Build client
      run: npm run build --prefix client

    - name: Start services
      run: docker compose --file docker-compose.local.yml up -d

    - name: Wait for services to be ready
      run: |
        echo "Waiting for services to be ready..."
        while ! curl -sSf http://localhost:3000 > /dev/null; do
          echo "Waiting for application to be ready..."
          sleep 5
        done

    - name: Install SecTester
      run: npm i --save-dev @sectester/core @sectester/repeater @sectester/scan @sectester/runner

    - name: Run security tests
      env:
        BRIGHT_HOSTNAME: ${{ vars.BRIGHT_HOSTNAME }}
        BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRIGHT_TARGET_URL: http://localhost:3000
      run: npx jest --config ./test/jest-e2e.config.mjs test/security/*.e2e-spec.ts
