name: "Security Tests"

on:
  pull_request:
    branches:
      - '**'

permissions:
  checks: write
  contents: read

env:
  POSTGRES_DB: bc
  POSTGRES_PASSWORD: bc
  POSTGRES_USER: bc
  URL: http://localhost:3000

jobs:
  security-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install SecTester
        run: npm i --save-dev @sectester/core @sectester/repeater @sectester/scan @sectester/runner

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Start services
        run: docker compose --file=docker-compose.local.yml up -d

      - name: Wait for application to be ready
        run: |
          until curl --output /dev/null --silent --head --fail "$URL"; do
            echo 'Waiting for application...'
            sleep 5
          done

      - name: Run security tests
        env:
          BRIGHT_HOSTNAME: ${{ vars.BRIGHT_HOSTNAME }}
          BRIGHT_PROJECT_ID: ${{ vars.BRIGHT_PROJECT_ID }}
          BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIGHT_TARGET_URL: ${{ env.URL }}
        run: npx jest --config ./test/jest-e2e.config.mjs test/security/*.e2e-spec.ts --maxWorkers=4

      - name: Stop services
        if: always()
        run: docker compose --file=docker-compose.local.yml down