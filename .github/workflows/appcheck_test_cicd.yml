# This workflow triggers an AppCheck DAST scan on every push to the main branch or manual dispatch.
# It securely retrieves AWS environment variables and secrets, runs the scan, monitors its progress,
# and fetches the final results using the AppCheck CLI.
# Here is a documentation for AppCheck CLI https://support.appcheck-ng.com/hc/en-us/articles/24509661124253-Using-the-AppCheck-CLI-Tool
# Request for all AWS environment variables from Infosec

name: AppCheck-DAST-Scan
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_S3_BUCKET: ${{ vars.APPCHECK_S3_BUCKET }}
  SCAN_ID: ${{ secrets.SCAN_ID }}
  AWS_ARN: ${{ vars.AWS_SEC_PROD_ROLE_ARN }}

jobs:
  scan_job:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: $AWS_ARN
          aws-region: $AWS_REGION

      - name: Download AppCheck CLI from S3
        run: |
          aws s3 cp $AWS_S3_BUCKET ./appcheck-cli
          chmod +x ./appcheck-cli

      - name: Start AppCheck Scan (fetch secret from Secrets Manager in-memory)
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            AppCheck_API=""
            unset AppCheck_API || true
          }
          trap cleanup EXIT

          # Fetch AppCheck API key from AWS Secrets Manager into a shell variable (in-memory only).
          # Do NOT write it to files, GITHUB_ENV or step outputs.
          AppCheck_API=$(aws secretsmanager get-secret-value \
            --secret-id AppCheck_CICDToken \
            --region $AWS_REGION \
            --query SecretString --output text)

          # Immediately pass secret to the CLI via stdin to avoid persisting as env or file.
          # Replace --token-stdin with the appropriate flag your CLI supports for stdin-token consumption.
          printf '%s' "$AppCheck_API" | ./appcheck-cli --token-stdin --action start --scan-id "$SCAN_ID"

          # Overwrite and unset variable (also handled by trap)
          AppCheck_API=""
          unset AppCheck_API || true

  watch_scan_1:
    runs-on: ubuntu-latest
    needs: scan_job
    timeout-minutes: 360
    continue-on-error: true
    if: always()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: $AWS_ARN
          aws-region: $AWS_REGION

      - name: Download AppCheck CLI from S3
        run: |
          aws s3 cp s3://$AWS_S3_BUCKET/appcheck-cli ./appcheck-cli
          chmod +x ./appcheck-cli

      - name: Watch AppCheck Scan (Part 1) — fetch secret in-memory
        shell: bash
        run: |
          set -euo pipefail
          cleanup() { AppCheck_API=""; unset AppCheck_API || true; }
          trap cleanup EXIT

          AppCheck_API=$(aws secretsmanager get-secret-value \
            --secret-id AppCheck_CICDToken \
            --region $AWS_REGION \
            --query SecretString --output text)

          printf '%s' "$AppCheck_API" | ./appcheck-cli --token-stdin --action watch --scan-id "$SCAN_ID"

          AppCheck_API=""
          unset AppCheck_API || true

  watch_scan_2:
    runs-on: ubuntu-latest
    needs: watch_scan_1
    timeout-minutes: 360
    continue-on-error: true
    if: always()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: $AWS_ARN
          aws-region: $AWS_REGION

      - name: Download AppCheck CLI from S3
        run: |
          aws s3 cp s3://$AWS_S3_BUCKET/appcheck-cli ./appcheck-cli
          chmod +x ./appcheck-cli

      - name: Watch AppCheck Scan (Part 2) — fetch secret in-memory
        shell: bash
        run: |
          set -euo pipefail
          cleanup() { SECRET=""; unset SECRET || true; }
          trap cleanup EXIT

          AppCheck_API=$(aws secretsmanager get-secret-value \
            --secret-id AppCheck_CICDToken \
            --region $AWS_REGION \
            --query SecretString --output text)

          printf '%s' "$AppCheck_API" | ./appcheck-cli --token-stdin --action watch --scan-id "$SCAN_ID"

          AppCheck_API=""
          unset AppCheck_API || true

  finalize_scan:
    runs-on: ubuntu-latest
    needs: watch_scan_2
    if: always()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: $AWS_ARN
          aws-region: $AWS_REGION

      - name: Download AppCheck CLI from S3
        run: |
          aws s3 cp s3://$AWS_S3_BUCKET/appcheck-cli ./appcheck-cli
          chmod +x ./appcheck-cli

      - name: Retry Fetch Final Scan Results (results → details fallback) — fetch secret in-memory
        shell: bash
        run: |
          set -euo pipefail
          cleanup() { AppCheck_API=""; unset AppCheck_API || true; }
          trap cleanup EXIT

          AppCheck_API=$(aws secretsmanager get-secret-value \
            --secret-id AppCheck_CICDToken \
            --region $AWS_REGION \
            --query SecretString --output text)

          for i in {1..5}; do
            printf '%s' "$AppCheck_API" | ./appcheck-cli --token-stdin --action results --scan-id "$SCAN_ID" --display-vulns && break
            echo "Retrying results in 30 seconds..."
            sleep 30
          done

          # Fallback
          printf '%s' "$AppCheck_API" | ./appcheck-cli --token-stdin --action details --scan-id "$SCAN_ID" --display-vulns

          AppCheck_API=""
          unset AppCheck_API || true
